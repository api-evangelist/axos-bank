note: >-
  Axos Bank's developer / Banking-as-a-Service program documents OAuth 2.0
  token-based authentication for its four API product families (Account
  Enrollment, Account Maintenance, Payment Solutions, Account Reporting).
  Access is partner-gated: a developer contacts the Axos API team, who
  provision sandbox/test credentials and later production credentials, and API
  keys are issued through a per-user secure developer dashboard. No public
  OpenAPI specification is published, so no machine-readable securityScheme
  could be harvested; this profile is captured from the public developer-portal
  documentation. Token, authorization, and scope endpoints are disclosed only
  after onboarding.
