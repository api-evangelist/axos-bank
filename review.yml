actions:
  openapiHarvested: false
  reason: |
    No public OpenAPI/Swagger/GraphQL/AsyncAPI specification exists to harvest.
    The developer program is partner-gated with documentation released only
    after onboarding. This is an honest first-party-portal-present, no-public-
    spec, no-documented-FDX/1033 result.
