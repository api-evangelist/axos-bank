name: Axos Bank
kind: company
description: Axos Bank is a branchless, digital-first federal savings bank chartered
  and regulated by the U.S. Office of the Comptroller of the Currency (OCC) and a member
  of the FDIC. Founded in 2000 as Bank of Internet USA and rebranded Axos in 2018,
  it is the primary banking subsidiary of Axos Financial, Inc. (NYSE AX), a Delaware
  financial holding company headquartered in San Diego, California with roughly $29
  billion in consolidated assets. Axos offers consumer and commercial deposit, lending,
  and treasury-management products online, and runs a first-party developer / Banking-as-a-Service
  program. That program is real but partner-gated - the public API Store documents
  four API product families (Account Enrollment, Account Maintenance, Payment Solutions,
  and Account Reporting) secured with OAuth 2.0, but access requires contacting the
  Axos API team; there is no self-serve signup, no publicly downloadable OpenAPI/Swagger
  specification, and no documented first-party FDX participation or published CFPB
  Section 1033 data-access posture.
